<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>알파벳 S 그리기</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css" rel="stylesheet">
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css');

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'Pretendard Variable',-apple-system,sans-serif;
    background:#F0F0F0;
    display:flex; justify-content:center; align-items:center;
    min-height:100vh; overflow:hidden;
  }
  #app {
    width:360px; height:760px;
    position:relative; overflow:hidden;
    background:linear-gradient(180deg,#FFF0E0 0%,#FFF8F2 60%);
  }

  /* ── 공통 컴포넌트 ── */
  .chip-title {
    background:rgba(255,124,17,0.16); padding:6px 10px; border-radius:100px;
    font-size:12px; font-weight:600; color:#FF7707;
  }
  /* 타이틀: SD WalkieTalkie Round TT 우선, fallback Pretendard */
  .game-title {
    font-family:'SD WalkieTalkie Round TT','Pretendard Variable',sans-serif;
    font-size:36px; font-weight:900; letter-spacing:-1px;
    text-align:center; width:220px; line-height:1.2;
    background:linear-gradient(135deg,#FF7300 0%,#FF821B 82%,#FFB84D 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .btn-primary {
    height:48px; width:328px; border-radius:12px;
    background:#FF7C11; color:#FFF;
    font-size:16px; font-weight:700; line-height:24px;
    text-align:center; border:none; cursor:pointer;
    font-family:'Pretendard Variable',sans-serif; transition:transform 150ms;
  }
  .btn-primary:active { transform:scale(0.97); }
  .btn-primary:disabled { background:#CCC; cursor:not-allowed; }
  .btn-secondary {
    height:48px; width:328px; border-radius:12px;
    background:#FFF4EB; border:2px solid rgba(255,124,17,0.10);
    color:#FF7C11; font-size:16px; font-weight:700; line-height:24px;
    text-align:center; cursor:pointer;
    font-family:'Pretendard Variable',sans-serif; transition:transform 150ms;
  }
  .btn-secondary:active { transform:scale(0.97); }
  /* btn/text: 처음으로 전용 */
  .btn-text-home {
    height:40px; width:328px; padding:12px 16px;
    font-size:15px; font-weight:500; color:#DFDFDF;
    text-decoration:underline; text-align:center;
    background:none; border:none; cursor:pointer;
    font-family:'Pretendard Variable',sans-serif;
  }
  /* btn/secondary 재활용 (광고보고 1번 더) — 이모지 없음 */
  .btn-ad-more {
    height:48px; width:328px; border-radius:12px;
    background:#FFF4EB; border:2px solid rgba(255,124,17,0.10);
    color:#FF7C11; font-size:16px; font-weight:700; line-height:24px;
    text-align:center; cursor:pointer;
    font-family:'Pretendard Variable',sans-serif;
    display:flex; align-items:center; justify-content:center;
    transition:transform 150ms;
  }
  .btn-ad-more:active { transform:scale(0.97); }
  .hidden { display:none !important; }

  /* ══ #1 인트로 ══ */
  #screen-intro {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center;
  }
  .intro-top {
    display:flex; flex-direction:column; align-items:center;
    padding-top:80px; gap:12px; z-index:1;
  }
  /* hero: 220×220, border-radius 12px (스킬 스펙) */
  .hero-wrap {
    width:220px; height:220px; margin-top:28px;
    display:flex; align-items:center; justify-content:center;
    animation:hero-float 3s ease-in-out infinite; z-index:1;
  }
  .hero-s {
    width:220px; height:220px; border-radius:12px;
    background:linear-gradient(145deg,#FF9A3C,#FF6B00);
    box-shadow:0px 4px 20px rgba(0,0,0,0.05),inset 0 2px 8px rgba(255,255,255,.3),inset 0 -4px 8px rgba(0,0,0,.15);
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
  }
  .hero-s::before {
    content:''; position:absolute; top:8px; left:16px;
    width:60%; height:30%; background:rgba(255,255,255,.25);
    border-radius:50%; filter:blur(8px);
  }
  .hero-s-letter {
    font-size:120px; font-weight:900; color:#FFF;
    line-height:1; letter-spacing:-2px;
    font-family:'Pretendard Variable',sans-serif;
  }
  @keyframes hero-float {
    0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)}
  }
  .cta-intro {
    position:fixed; bottom:0; width:360px;
    background:linear-gradient(180deg,rgba(255,248,242,0) 0%,rgba(255,248,242,0.95) 40%,#FFF8F2 100%);
    padding:80px 16px 28px;
    display:flex; flex-direction:column; align-items:center; gap:10px; z-index:2;
  }
  .chip-chance {
    background:#494949; padding:8px 10px; border-radius:100px;
    font-size:12px; font-weight:600; color:#FFF;
  }
  .chip-chance span { color:#FF9A3C; }

  /* ══ #1.1 게임방법 ══ */
  #screen-howto {
    position:absolute; inset:0; display:none;
    flex-direction:column; align-items:center; justify-content:center;
    background:linear-gradient(180deg,#FFF0E0 0%,#FFF8F2 60%);
  }
  .howto-box {
    display:flex; flex-direction:column; align-items:center; gap:12px; opacity:0;
  }
  .howto-label {
    font-size:13px; font-weight:600; color:#FF7707;
    background:rgba(255,124,17,.1); padding:4px 10px; border-radius:100px;
  }
  .howto-line1,.howto-line2 {
    font-size:24px; font-weight:700; color:#232323;
    text-align:center; line-height:1.4;
  }
  @keyframes howto-in  { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes howto-out { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-20px)} }

  /* ══ #1.2 카운트다운 dim ══ */
  #screen-countdown {
    position:absolute; inset:0; display:none;
    background:rgba(0,0,0,.5); align-items:center; justify-content:center; z-index:10;
    width:360px; height:760px; overflow:hidden;
  }
  .countdown-num {
    font-size:80px; font-weight:700; color:#FFF;
    letter-spacing:-2.4px;
    text-shadow:0px 4px 20px rgba(0,0,0,0.05);
    animation:countdown-stamp 300ms ease-out;
  }
  @keyframes countdown-stamp {
    0%{transform:scale(1.4);opacity:0} 60%{transform:scale(.95);opacity:1} 100%{transform:scale(1);opacity:1}
  }

  /* ══ #2 플레이 ══ */
  #screen-play {
    position:absolute; inset:0; display:none;
    flex-direction:column; align-items:center;
    background:linear-gradient(180deg,#FFF0E0 0%,#FFF8F2 60%);
  }
  .play-top-text { margin-top:44px; text-align:center; }
  .play-main-text { font-size:18px; font-weight:700; color:#232323; }
  .play-sub-text  { font-size:13px; font-weight:600; color:#FF7707; margin-top:4px; }

  /* progress bar — add timer variant: gap 20px, bg #FFF */
  .timer-wrap { margin-top:14px; display:flex; align-items:center; gap:20px; width:320px; }
  .timer-bar-bg {
    flex:1; height:12px; border-radius:20px;
    background:#FFFFFF; overflow:hidden;
    box-shadow:0 1px 4px rgba(0,0,0,0.08);
  }
  .timer-bar-fill {
    height:100%; border-radius:20px;
    background:linear-gradient(90deg,#FF7C11,#FFAD50);
    width:100%; transition:width 300ms linear;
  }
  .timer-chip {
    background:#FFFFFF; border-radius:100px; padding:4px 12px;
    font-size:15px; font-weight:700; color:#FF7707;
    white-space:nowrap;
  }
  /* content frame: margin-top 32dp (스킬 스펙) */
  .content-frame {
    width:320px; height:320px; border-radius:20px;
    background:#FFF; box-shadow:0px 4px 20px rgba(0,0,0,0.05);
    margin-top:32px; position:relative; overflow:hidden; touch-action:none; padding:16px;
  }
  #draw-canvas { position:absolute; inset:0; cursor:crosshair; }

  /* chip/ingame: content frame 하단 28dp (스킬 스펙) */
  .live-score-wrap {
    margin-top:28px;
    display:flex; align-items:center; gap:16px;
  }
  .live-score-box {
    background:rgba(255,124,17,0.16); border-radius:100px;
    padding:6px 12px; display:flex; align-items:center; gap:4px;
  }
  .live-score-label { font-size:15px; font-weight:400; color:#3D3D3D; }
  .live-score-val   { font-size:15px; font-weight:700; color:#232323; min-width:32px; text-align:right; }
  .live-score-unit  { font-size:15px; font-weight:700; color:#232323; }

  .best-score-box {
    background:rgba(255,124,17,0.16); border-radius:100px;
    padding:6px 12px; display:flex; align-items:center; gap:4px;
  }
  .best-score-label { font-size:15px; font-weight:400; color:#3D3D3D; }
  .best-score-val   { font-size:15px; font-weight:700; color:#232323; }

  .ad-banner {
    position:absolute; bottom:0; width:360px; height:100px;
    background:#F0F0F0; display:flex; align-items:center; justify-content:center;
    border-top:1px solid #E0E0E0; z-index:5;
  }
  .ad-banner-inner {
    width:320px; height:80px;
    background:linear-gradient(135deg,#E8E8E8,#D8D8D8);
    border-radius:8px; display:flex; align-items:center; justify-content:center;
    font-size:12px; color:#AAA; font-weight:500; border:1px dashed #CCC;
  }

  /* ══ 인터스티셜 ══ */
  #screen-interstitial {
    position:absolute; inset:0; background:rgba(0,0,0,.85);
    display:none; flex-direction:column; align-items:center; justify-content:center; z-index:50;
  }
  .interstitial-box {
    width:320px; background:#FFF; border-radius:20px;
    overflow:hidden; display:flex; flex-direction:column; align-items:center;
  }
  .interstitial-ad-area {
    width:320px; height:240px;
    background:linear-gradient(135deg,#E8E8E8,#D0D0D0);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
  }
  .interstitial-ad-label { font-size:12px; color:#AAA; }
  .interstitial-ad-mock  { font-size:13px; font-weight:600; color:#888; }
  .interstitial-skip-row {
    width:100%; padding:16px;
    display:flex; flex-direction:column; align-items:center; gap:8px;
  }
  .interstitial-timer { font-size:13px; color:#AAA; }
  .btn-interstitial-skip {
    height:48px; width:288px; border-radius:12px;
    background:#FF7C11; color:#FFF; font-size:16px; font-weight:700;
    border:none; cursor:not-allowed; font-family:'Pretendard Variable',sans-serif;
    opacity:.4; transition:opacity 300ms;
  }
  .btn-interstitial-skip.active { opacity:1; cursor:pointer; }

  /* ══ #3 결과 dim ══ */
  #screen-result {
    position:absolute; top:0; left:0;
    width:360px; height:760px; overflow:hidden;
    display:none; background:rgba(0,0,0,.5);
    flex-direction:column; align-items:center; justify-content:flex-start; z-index:20;
  }
  .confetti-wrap { position:absolute; inset:0; pointer-events:none; z-index:1; }
  .confetti-piece {
    position:absolute; width:8px; height:8px; border-radius:2px;
    animation:confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0%{transform:translateY(-20px) rotate(0deg);opacity:1}
    100%{transform:translateY(800px) rotate(720deg);opacity:0}
  }
  /* popup frame (스킬 스펙: padding 16px 16px 32px, gap 20px) */
  .result-popup {
    width:320px; background:#FFF; border-radius:20px;
    box-shadow:0px 4px 20px rgba(0,0,0,0.05);
    padding:16px 16px 32px;
    display:flex; flex-direction:column; align-items:center; gap:20px;
    margin-top:80px; z-index:2; position:relative;
  }
  .result-phrase {
    font-size:15px; font-weight:600; color:#888;
  }
  .result-score-row {
    display:flex; align-items:baseline; gap:4px;
  }
  /* 핵심 수치: 60px, ExtraBold, text-shadow 허용 (스킬 스펙) */
  .result-score-num {
    font-size:60px; font-weight:800; letter-spacing:-1px; line-height:1;
    background:linear-gradient(135deg,#FF7300 0%,#FF821B 82%,#FFB84D 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .result-score-unit {
    font-size:24px; font-weight:700; line-height:28px;
    background:linear-gradient(135deg,#FF7300 0%,#FF821B 82%,#FFB84D 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  /* 지난 점수: 점수 설명 pill 스타일 (스킬 스펙) */
  .result-past-row {
    background:#FFF4EB; border-radius:12px;
    padding:12px 16px; width:260px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .result-past-label { font-size:13px; font-weight:700; color:#494949; }
  .result-past-val   { font-size:13px; font-weight:700; color:#FF7707; }
  /* 상위% chip 재활용 */
  .new-record-badge {
    background:rgba(255,124,17,0.16); border-radius:100px; padding:6px 10px;
    font-size:12px; font-weight:600; color:#FF7707;
  }
  .btn-point {
    height:48px; width:288px; border-radius:12px;
    background:#FF7C11; color:#FFF;
    font-size:16px; font-weight:700; line-height:24px;
    border:none; cursor:pointer;
    font-family:'Pretendard Variable',sans-serif; transition:transform 150ms;
  }
  .btn-point:active { transform:scale(0.97); }
  .btn-point:disabled { background:#CCC; cursor:not-allowed; }

  /* CTA end */
  .cta-end {
    position:absolute; bottom:0; width:360px;
    background:linear-gradient(180deg,rgba(0,0,0,0) 0%,rgba(0,0,0,0.3) 99.29%);
    padding:80px 16px 28px;
    display:flex; flex-direction:column; align-items:center; gap:10px; z-index:2;
  }
  .chip-remain {
    background:#494949; padding:8px 10px; border-radius:100px;
    font-size:12px; font-weight:600; color:#FFF;
  }
  .chip-remain span { color:#FF9A3C; }

  /* ══ 공통 팝업 ══ */
  #popup-overlay {
    position:absolute; inset:0; background:rgba(0,0,0,.5);
    display:none; align-items:center; justify-content:center; z-index:100;
  }
  .popup-box {
    width:288px; background:#FFF; border-radius:20px;
    padding:28px 20px 20px;
    display:flex; flex-direction:column; align-items:center; gap:16px;
  }
  .popup-title { font-size:17px; font-weight:700; color:#232323; text-align:center; line-height:1.4; }
  .popup-desc  { font-size:14px; font-weight:400; color:#777; text-align:center; line-height:1.5; }
  .popup-btn {
    height:48px; width:248px; border-radius:12px;
    background:#FF7C11; color:#FFF; font-size:16px; font-weight:700;
    border:none; cursor:pointer; font-family:'Pretendard Variable',sans-serif; transition:transform 150ms;
  }
  .popup-btn:active { transform:scale(0.97); }

  #toast {
    position:absolute; bottom:120px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:rgba(50,50,50,.92); color:#FFF;
    font-size:13px; font-weight:500; padding:10px 20px;
    border-radius:100px; white-space:nowrap;
    opacity:0; transition:opacity 300ms,transform 300ms;
    z-index:200; pointer-events:none;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">

  <!-- ══ #1 인트로 ══ -->
  <div id="screen-intro" style="display:flex;">
    <div class="intro-top">
      <div class="chip-title">미니게임</div>
      <div class="game-title">알파벳 S<br>3초 이어 그리기</div>
    </div>
    <div class="hero-wrap">
      <div class="hero-s"><div class="hero-s-letter">S</div></div>
    </div>
    <div class="cta-intro">
      <div class="chip-chance" id="intro-chance-chip">오늘 <span>3</span>번 기회 드려요</div>
      <button class="btn-primary" id="btn-start" onclick="startHowto()">시작하기</button>
      <button class="btn-secondary hidden" id="btn-ad-intro" onclick="watchAdForChance('intro')">광고 보고 1번 더</button>
    </div>
  </div>

  <!-- ══ #1.1 게임방법 ══ -->
  <div id="screen-howto">
    <div class="howto-box" id="howto-box">
      <div class="howto-label">게임 방법</div>
      <div class="howto-line1" id="howto-l1"></div>
      <div class="howto-line2" id="howto-l2"></div>
    </div>
  </div>

  <!-- ══ #1.2 카운트다운 ══ -->
  <div id="screen-countdown">
    <div class="countdown-num" id="countdown-num">3</div>
  </div>

  <!-- ══ #2 플레이 ══ -->
  <div id="screen-play">
    <div class="play-top-text">
      <div class="play-main-text">3초 안에 한 번에 이어 그려요</div>
      <div class="play-sub-text">최고 점수를 받으면 하루 최대 9번 포인트 획득!</div>
    </div>
    <div class="timer-wrap">
      <div class="timer-bar-bg"><div class="timer-bar-fill" id="timer-bar"></div></div>
      <div class="timer-chip" id="timer-text">3.0초</div>
    </div>
    <div class="content-frame">
      <canvas id="draw-canvas" width="320" height="320"></canvas>
    </div>
    <!-- 실시간 점수 -->
    <div class="live-score-wrap">
      <div class="live-score-box">
        <span class="live-score-label">이번 점수</span>
        <span class="live-score-val" id="live-score">0</span>
        <span class="live-score-unit">%</span>
      </div>
      <div class="best-score-box hidden" id="best-score-box">
        <span class="best-score-label">최고 기록</span>
        <span class="best-score-val" id="play-best">--</span>
      </div>
    </div>
    <div class="ad-banner">
      <div class="ad-banner-inner">광고 영역 (320×100) · 애드센스</div>
    </div>
  </div>

  <!-- ══ 인터스티셜 (전창) ══ -->
  <div id="screen-interstitial" style="display:none; position:absolute; inset:0; z-index:50; flex-direction:column; align-items:center; justify-content:center; background:#1A1A1A;">
    <div class="interstitial-ad-area" style="width:360px; height:760px; position:relative;">
      <div style="position:absolute; inset:0; background:linear-gradient(135deg,#2A2A2A,#1A1A1A); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;">
        <div style="font-size:11px; color:#666; letter-spacing:1px;">광고</div>
        <div style="font-size:15px; font-weight:600; color:#999;">인터스티셜 광고 영역</div>
        <div style="font-size:12px; color:#555;">360 × 760</div>
      </div>
      <div style="position:absolute; top:24px; right:24px; font-size:13px; font-weight:600; color:#FFF; background:rgba(0,0,0,0.5); padding:6px 14px; border-radius:100px;" id="interstitial-countdown">5</div>
    </div>
  </div>

  <!-- ══ #3 결과 ══ -->
  <div id="screen-result">
    <div class="confetti-wrap" id="confetti-wrap"></div>
    <div class="result-popup">
      <!-- 신기록 뱃지 -->
      <div class="new-record-badge hidden" id="new-record-badge">신기록 달성!</div>
      <!-- 구간별 안내 문구 -->
      <div class="result-phrase" id="result-phrase">수고했어요</div>
      <!-- 점수 -->
      <div class="result-score-row">
        <span class="result-score-num" id="result-score-val">0</span>
        <span class="result-score-unit">%</span>
      </div>
      <!-- 지난 점수 한 줄 -->
      <div class="result-past-row" id="result-past-row">
        <span class="result-past-label">지난 점수</span>
        <span class="result-past-val" id="result-past-val">--</span>
      </div>
      <!-- 1P 받기 -->
      <button class="btn-point hidden" id="btn-get-point" onclick="getPoint()">1P 받기</button>
    </div>
    <div class="cta-end">
      <div class="chip-remain hidden" id="result-remain-chip">오늘 <span id="result-remain-num">0</span>번 남았어요</div>
      <button class="btn-primary hidden" id="btn-retry" onclick="retryGame()">다시하기</button>
      <button class="btn-ad-more hidden" id="btn-ad-result" onclick="watchAdForChance('result')">광고 보고 1번 더 하기</button>
      <button class="btn-text-home" onclick="goHome()">처음으로</button>
    </div>
  </div>

  <!-- ══ 팝업 ══ -->
  <div id="popup-overlay" onclick="closePopup()">
    <div class="popup-box" onclick="event.stopPropagation()">
      <div class="popup-title" id="popup-title">알림</div>
      <div class="popup-desc"  id="popup-desc"></div>
      <button class="popup-btn" onclick="closePopup()">확인</button>
    </div>
  </div>
  <div id="toast"></div>
</div>

<script>
/* ═══════════════════════════════
   STATE
═══════════════════════════════ */
const STATE = {
  chances: 3,
  bestScore: null,   // % (0~100)
  todayPoints: 0,
  currentScore: 0,
  MAX_DAILY_POINTS: 9,
};

/* ═══════════════════════════════
   유틸
═══════════════════════════════ */
function showScreen(id) {
  ['screen-intro','screen-howto','screen-countdown','screen-play','screen-result','screen-interstitial']
    .forEach(s => { document.getElementById(s).style.display='none'; });
  document.getElementById(id).style.display='flex';
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function showPopup(title,desc) {
  document.getElementById('popup-title').textContent=title;
  document.getElementById('popup-desc').textContent=desc;
  document.getElementById('popup-overlay').style.display='flex';
}
function closePopup(){ document.getElementById('popup-overlay').style.display='none'; }
function updateIntroUI() {
  const n=STATE.chances;
  document.getElementById('btn-start').disabled = n<=0;
  document.getElementById('btn-ad-intro').classList.toggle('hidden', n>0);
  document.getElementById('intro-chance-chip').innerHTML = n>0
    ? `오늘 <span>${n}</span>번 기회 드려요`
    : `참여 기회가 없어요`;
}

/* ═══════════════════════════════
   S 마스크: canvas fillText로 정확한 알파벳 S 픽셀 생성
═══════════════════════════════ */
const CS = 320;

let maskCanvas, maskCtx, maskData, totalMaskPx;

function buildMask() {
  maskCanvas = document.createElement('canvas');
  maskCanvas.width = maskCanvas.height = CS;
  maskCtx = maskCanvas.getContext('2d');
  maskCtx.clearRect(0, 0, CS, CS);

  maskCtx.fillStyle    = '#000';
  maskCtx.font         = '900 260px Arial Black, Arial, sans-serif';
  maskCtx.textAlign    = 'center';
  maskCtx.textBaseline = 'alphabetic';
  const m = maskCtx.measureText('S');
  const y = (CS + m.actualBoundingBoxAscent - m.actualBoundingBoxDescent) / 2;
  maskCtx.fillText('S', CS / 2, y);

  maskData = maskCtx.getImageData(0, 0, CS, CS);
  totalMaskPx = 0;
  for (let i = 3; i < maskData.data.length; i += 4) {
    if (maskData.data[i] > 32) totalMaskPx++;
  }
}
buildMask();

function isInMask(x, y) {
  const xi = Math.round(x), yi = Math.round(y);
  if (xi < 0 || xi >= CS || yi < 0 || yi >= CS) return false;
  return maskData.data[(yi * CS + xi) * 4 + 3] > 32;
}

/* ─── 사용자 획 → 채움 픽셀 계산 ─── */
// 사용자 경로를 오프스크린에 그린 뒤 마스크와 AND 비교
let userFillCanvas, userFillCtx;

function initUserFillCanvas() {
  userFillCanvas = document.createElement('canvas');
  userFillCanvas.width = userFillCanvas.height = CS;
  userFillCtx = userFillCanvas.getContext('2d');
  userFillCtx.clearRect(0,0,CS,CS);
}

function calcLiveScore(pts) {
  if (pts.length < 2) return 0;

  // 사용자 획을 오프스크린에 그리기
  userFillCtx.clearRect(0,0,CS,CS);
  userFillCtx.strokeStyle = '#000';
  userFillCtx.lineWidth   = 18;  // 사용자 획 두께
  userFillCtx.lineCap     = 'round';
  userFillCtx.lineJoin    = 'round';
  userFillCtx.beginPath();
  pts.forEach((p,i)=>{ if(i===0) userFillCtx.moveTo(p.x,p.y); else userFillCtx.lineTo(p.x,p.y); });
  userFillCtx.stroke();

  const userPixels = userFillCtx.getImageData(0,0,CS,CS);

  // 마스크 안에 있는 사용자 픽셀 / 마스크 밖에 있는 사용자 픽셀
  let inside=0, outside=0;
  for (let i=3; i<userPixels.data.length; i+=4) {
    if (userPixels.data[i] > 32) {
      const idx = (i-3)/4;
      if (maskData.data[i] > 32) inside++;   // 마스크 안
      else outside++;                          // 마스크 밖
    }
  }

  if (inside+outside === 0) return 0;

  // 채움률: 마스크 총 픽셀 대비 안에 그린 픽셀 비율
  const fillRatio    = inside / totalMaskPx;
  // 이탈률: 전체 그린 픽셀 대비 밖으로 나간 비율
  const outsideRatio = outside / (inside+outside);

  // 페널티: 이탈률에 따라 최대 25점 감점
  const penalty = outsideRatio * 25;

  const raw = fillRatio * 100 - penalty;
  return Math.max(0, Math.min(100, Math.round(raw)));
}

/* ═══════════════════════════════
   캔버스 드로잉 — fillText 기반
═══════════════════════════════ */
function drawSText(ctx, color) {
  ctx.save();
  ctx.font         = '900 260px Arial Black, Arial, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillStyle    = color;
  // measureText로 실제 bounding box 중앙 정렬
  const m = ctx.measureText('S');
  const textH = m.actualBoundingBoxAscent + m.actualBoundingBoxDescent;
  const x = CS / 2;
  const y = (CS + m.actualBoundingBoxAscent - m.actualBoundingBoxDescent) / 2;
  ctx.fillText('S', x, y);
  ctx.restore();
}

function drawGuide(ctx) {
  // 그레이톤 가이드 S
  drawSText(ctx, 'rgba(180,180,180,0.35)');
}

function drawUserStroke(ctx, pts) {
  if (pts.length < 2) return;
  ctx.save();
  ctx.strokeStyle = '#FF7C11';
  ctx.lineWidth   = 18;
  ctx.lineCap     = 'round'; ctx.lineJoin='round';
  ctx.globalAlpha = 0.9;
  ctx.setLineDash([]);
  ctx.beginPath();
  pts.forEach((p,i)=>{ if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); });
  ctx.stroke();
  ctx.restore();
}

/* ═══════════════════════════════
   화면 전환
═══════════════════════════════ */
function startHowto() { showScreen('screen-howto'); runHowto(); }

const HOWTO_STEPS = [
  { l1:'굵은 S 영역 안을', l2:'한 획으로 채우세요' },
  { l1:'3초 안에 최대한', l2:'꽉 채울수록 고득점!' }
];
function runHowto() {
  let idx=0;
  const box=document.getElementById('howto-box');
  function showStep() {
    if (idx>=HOWTO_STEPS.length){ startCountdown(); return; }
    const s=HOWTO_STEPS[idx];
    document.getElementById('howto-l1').textContent=s.l1;
    document.getElementById('howto-l2').textContent=s.l2;
    box.style.animation='none'; box.offsetHeight;
    box.style.animation='howto-in 400ms ease forwards';
    setTimeout(()=>{
      box.style.animation='howto-out 400ms ease forwards';
      setTimeout(()=>{ idx++; showStep(); },400);
    },1000);
  }
  showStep();
}

function startCountdown() {
  showScreen('screen-countdown');
  let n=3;
  const el=document.getElementById('countdown-num');
  function tick() {
    el.textContent=n; el.style.animation='none'; el.offsetHeight;
    el.style.animation='countdown-stamp 300ms ease-out';
    if(n===0){ setTimeout(startPlay,500); return; }
    n--; setTimeout(tick,1000);
  }
  tick();
}

/* ═══════════════════════════════
   플레이
═══════════════════════════════ */
let timerInterval=null, gameActive=false, gameStarted=false, drawingPts=[];

function startPlay() {
  STATE.chances--;
  initUserFillCanvas();
  const hasBest = STATE.bestScore !== null;
  const bestBox = document.getElementById('best-score-box');
  if (hasBest) {
    bestBox.classList.remove('hidden');
    document.getElementById('play-best').textContent = STATE.bestScore + '%';
  } else {
    bestBox.classList.add('hidden');
  }
  document.getElementById('live-score').textContent = '0';
  showScreen('screen-play');
  initCanvas();
  resetTimerUI();
}

function initCanvas() {
  const canvas=document.getElementById('draw-canvas');
  const ctx=canvas.getContext('2d');
  drawingPts=[]; gameActive=true; gameStarted=false;
  ctx.clearRect(0,0,CS,CS);
  drawGuide(ctx);

  canvas.onmousedown  = e=>onStart(e.offsetX,e.offsetY);
  canvas.onmousemove  = e=>{ if(gameActive&&gameStarted) onMove(e.offsetX,e.offsetY); };
  canvas.onmouseup    = ()=>onEnd();
  canvas.onmouseleave = ()=>{ if(gameStarted) onEnd(); };
  canvas.ontouchstart = e=>{ e.preventDefault(); const r=canvas.getBoundingClientRect(),t=e.touches[0]; onStart(t.clientX-r.left,t.clientY-r.top); };
  canvas.ontouchmove  = e=>{ e.preventDefault(); if(!gameActive||!gameStarted)return; const r=canvas.getBoundingClientRect(),t=e.touches[0]; onMove(t.clientX-r.left,t.clientY-r.top); };
  canvas.ontouchend   = e=>{ e.preventDefault(); onEnd(); };
}

function onStart(x,y) {
  if(!gameActive)return;
  gameStarted=true; drawingPts=[{x,y}];
  startTimerRun();
}
function onMove(x,y) {
  drawingPts.push({x,y});
  // 실시간 점수
  const score=calcLiveScore(drawingPts);
  document.getElementById('live-score').textContent=score;
  // 리드로우
  const ctx=document.getElementById('draw-canvas').getContext('2d');
  ctx.clearRect(0,0,CS,CS);
  drawGuide(ctx);
  drawUserStroke(ctx,drawingPts);
}
function onEnd() {
  if(!gameActive||!gameStarted)return;
  gameActive=false;
  clearInterval(timerInterval);
  STATE.currentScore=calcLiveScore(drawingPts);
  showInterstitial();
}

function resetTimerUI() {
  document.getElementById('timer-bar').style.width='100%';
  document.getElementById('timer-text').textContent='3.0초';
}
function startTimerRun() {
  clearInterval(timerInterval);
  const TOTAL=3000, start=Date.now();
  timerInterval=setInterval(()=>{
    const rem=Math.max(0,TOTAL-(Date.now()-start));
    document.getElementById('timer-bar').style.width=(rem/TOTAL*100)+'%';
    document.getElementById('timer-text').textContent=(rem/1000).toFixed(1)+'초';
    if(rem<=0){ clearInterval(timerInterval); if(gameActive){gameActive=false;STATE.currentScore=calcLiveScore(drawingPts);showInterstitial();} }
  },50);
}

/* ═══════════════════════════════
   인터스티셜
═══════════════════════════════ */
let interstitialTimer=null;
function showInterstitial() {
  showScreen('screen-interstitial');
  let rem=5;
  const countEl=document.getElementById('interstitial-countdown');
  countEl.textContent=rem;
  interstitialTimer=setInterval(()=>{
    rem--;
    countEl.textContent=rem;
    if(rem<=0){ clearInterval(interstitialTimer); showResult(); }
  },1000);
}

/* ═══════════════════════════════
   결과
═══════════════════════════════ */
function getPhrase(score) {
  if (score >= 90) return '손이 야무지네요!';
  if (score >= 75) return '거의 완벽해요!';
  if (score >= 60) return '꽤 잘 그렸어요';
  if (score >= 45) return '한 번 더 해봐요';
  if (score >= 30) return '다시 도전해봐요';
  return '조금만 더 힘내요';
}

function showResult() {
  const score    = STATE.currentScore;
  const prevBest = STATE.bestScore;
  const isNew    = prevBest === null || score > prevBest;
  if (isNew) STATE.bestScore = score;

  // 구간별 문구
  document.getElementById('result-phrase').textContent = getPhrase(score);

  // 점수
  document.getElementById('result-score-val').textContent = score;

  // 신기록 뱃지
  document.getElementById('new-record-badge').classList.toggle('hidden', !isNew);

  // 지난 점수: 이전 기록이 있으면 항상 노출
  const pastRow = document.getElementById('result-past-row');
  const pastVal = document.getElementById('result-past-val');
  if (prevBest === null) {
    pastRow.style.display = 'none';
  } else {
    pastRow.style.display = 'flex';
    pastVal.textContent = prevBest + '%';
  }

  // 1P 받기
  const btnPt = document.getElementById('btn-get-point');
  if (isNew && STATE.todayPoints < STATE.MAX_DAILY_POINTS) {
    btnPt.classList.remove('hidden'); btnPt.disabled = false; btnPt.textContent = '1P 받기';
  } else { btnPt.classList.add('hidden'); }

  // 남은 횟수
  document.getElementById('result-remain-num').textContent = STATE.chances;
  document.getElementById('result-remain-chip').classList.remove('hidden');
  document.getElementById('btn-retry').classList.toggle('hidden', STATE.chances <= 0);
  if (STATE.chances > 0) document.getElementById('btn-retry').textContent = `다시하기 (${STATE.chances}회 남음)`;
  document.getElementById('btn-ad-result').classList.toggle('hidden', STATE.chances > 0);

  showScreen('screen-result');
  spawnConfetti();
}

function spawnConfetti() {
  const wrap=document.getElementById('confetti-wrap');
  wrap.innerHTML='';
  const colors=['#FF7C11','#FFB84D','#FF4B4B','#4BAAFF','#4BFF8A','#FF4BDB'];
  for(let i=0;i<40;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*360}px;background:${colors[i%colors.length]};transform:rotate(${Math.random()*360}deg);animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;`;
    wrap.appendChild(el);
  }
}

function getPoint() {
  if(STATE.todayPoints>=STATE.MAX_DAILY_POINTS){
    showPopup('오늘의 보상 완료','오늘의 보상을 모두 획득했어요.\n내일 다시 도전해 보세요!'); return;
  }
  STATE.todayPoints++;
  const btn=document.getElementById('btn-get-point');
  btn.disabled=true; btn.textContent='적립 완료';
  showToast('1P 적립! 완료까지 시간이 조금 걸릴 수 있어요.');
}

function watchAdForChance(from) {
  // 인터스티셜 5초 광고 노출 후 기회 지급
  showScreen('screen-interstitial');
  let rem=5;
  const countEl=document.getElementById('interstitial-countdown');
  countEl.textContent=rem;
  const iv=setInterval(()=>{
    rem--;
    countEl.textContent=rem;
    if(rem<=0){
      clearInterval(iv);
      STATE.chances++;
      showToast('광고 시청 완료! 1회 추가됐어요.');
      if(from==='intro'){ updateIntroUI(); showScreen('screen-intro'); }
      else { showResult(); }
    }
  },1000);
}

function retryGame(){ showScreen('screen-howto'); runHowto(); }
function goHome(){ updateIntroUI(); showScreen('screen-intro'); }

updateIntroUI();
</script>
</body>
</html>
